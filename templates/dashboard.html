
<!doctype html><html><head>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head><body class="bg-light">
<div class="container mt-4">
<h2>Dashboard</h2>
<div class="row">
<div class="col"><div class="card bg-primary text-white p-3">Projects: {{projects}}</div></div>
<div class="col"><div class="card bg-success text-white p-3">Active: {{active}}</div></div>
<div class="col"><div class="card bg-warning text-dark p-3">Completed: {{completed}}</div></div>
<div class="col"><div class="card bg-danger text-white p-3">Tasks: {{tasks}}</div></div>
</div>
<br>
<canvas id="chart"></canvas>
<script>
new Chart(document.getElementById('chart'),{
type:'doughnut',
data:{labels:['Active','Completed'],
datasets:[{data:[{{active}},{{completed}}]}]}
});
</script>
<br>
<a class="btn btn-dark" href="/projects">Manage Projects</a>
</div></body></html>
