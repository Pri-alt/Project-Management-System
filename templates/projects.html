
<!doctype html><html><head>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head><body><div class="container mt-4">
<h2>Projects</h2>
<form method="post">
<input class="form-control mb-2" name="name" placeholder="Project Name">
<input class="form-control mb-2" name="description" placeholder="Description">
<select class="form-control mb-2" name="status">
<option>Active</option><option>Completed</option><option>On Hold</option>
</select>
<button class="btn btn-success">Add Project</button>
</form><hr>
<table class="table table-bordered">
<tr><th>Name</th><th>Status</th><th>Tasks</th></tr>
{% for p in projects %}
<tr>
<td>{{p[1]}}</td>
<td>{{p[3]}}</td>
<td><a class="btn btn-primary btn-sm" href="/tasks/{{p[0]}}">Open</a></td>
</tr>
{% endfor %}
</table>
</div></body></html>
